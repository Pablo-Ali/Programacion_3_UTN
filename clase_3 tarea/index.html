<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Online Banking</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>


        <section class="grid">

            <div class="uno">

                <header>
                    <div id="logo">
                        <a href="https://www.galicia.ar/personas">
                            <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.LXWldCV63mgFdhaHtAaa6QAAAA%3Fpid%3DApi&f=1&ipt=49e4d2ddf8d918d0c75e2b22c604b023c5e1d93f29b14791158aa29b726ab3d3&ipo=images" alt="Linj a galicia.ar">
                        <p>Online Banking</p>
                        </a>
                    </div>
                </header>

                <main>
                    <form>
                        <div id="titulo-form">
                            <h3>Iniciar sesión</h3>
                        </div>
                        <div id="dni-form">
                            <input type="number" placeholder="Tu DNI">
                        </div>
                        <div id="usuario-form">
                            <input type="password" placeholder="Tu usuario Galicia">
                        </div>
                        <div id="clave-form">
                            <input type="password" placeholder="Tu clave Galicia">
                        </div>
                        <div id="recordar-form">
                            <input id="checkbox" type="checkbox">
                            <label for="checkbox">Recordar DNI y Usuario</label>
                        </div>
                        <div id="teclado-form">
                            <p>Teclado Virtual</p> <!--Dios sabrá cómo meto un teclado flotante acá-->
                        </div>
                        <div id="b-iniciar-form">
                            <button>INICIAR SESIÓN</button>
                        </div>
                        <div id="b-olvide-form">
                            <button>OLVIDÉ O BLOQUEÉ MIS CLAVES</button>
                        </div>
                        <div id="b-crear-form">
                            <button id="crear-claves">CREÁ TUS CLAVES</button>
                            <br>
                            <label for="crear-claves">Si es tu primera vez o necesitás el usuario</label>
                        </div>
                    </form>
                </main>

                <footer>
                    <p>
                        Operar con Online Banking implica aceptar los términos y condiciones en los que se ofrece el servicio.
                        <br>
                        Información sobre seguridad. Ir a Office Banking
                    </p>
                </footer>

            </div>

            <div class="dos" id="arte">
                <img src="https://onlinebanking.bancogalicia.com.ar/images/art/102-sin-titulo-Victoria-Salvay.jpg" alt="102-sin-titulo-Victoria-Salvay">
            </div> 

        </section>  

    </body>
</html>
